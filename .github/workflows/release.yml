name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: FolderCompareDeleteApp
            asset_name: FolderCompareDeleteApp-Windows.exe
          - os: ubuntu-latest
            artifact_name: FolderCompareDeleteApp
            asset_name: FolderCompareDeleteApp-Linux
          - os: macos-latest
            artifact_name: FolderCompareDeleteApp
            asset_name: FolderCompareDeleteApp-macOS

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Set to your desired Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller send2trash openpyxl

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name ${{ matrix.artifact_name }} folder_compare_delete_app.py

    - name: Rename asset for Linux/macOS
      if: matrix.os != 'windows-latest'
      run: |
        mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

    - name: Rename asset for Windows
      if: matrix.os == 'windows-latest'
      run: |
        move dist\${{ matrix.artifact_name }}.exe dist\${{ matrix.asset_name }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -R artifacts

    - name: Extract full changelog
      run: cat CHANGELOG.md > full_changelog.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body_path: full_changelog.md
        files: |
          artifacts/FolderCompareDeleteApp-Windows.exe/FolderCompareDeleteApp-Windows.exe
          artifacts/FolderCompareDeleteApp-Linux/FolderCompareDeleteApp-Linux
          artifacts/FolderCompareDeleteApp-macOS/FolderCompareDeleteApp-macOS
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
